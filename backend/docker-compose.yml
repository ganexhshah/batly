##############################################################################
#  Battly Backend — Docker Compose
##############################################################################

services:

  # ── Laravel Application (PHP-FPM) ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: battly_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      meilisearch:
        condition: service_started
    environment:
      - CONTAINER_ROLE=app
    networks:
      - battly

  # ── Nginx ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: battly_nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - reverb
    networks:
      - battly

  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: battly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-battly}
      POSTGRES_USER: ${DB_USERNAME:-battly}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-battly}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - battly

  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: battly_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - battly

  # ── MinIO (S3-Compatible Storage) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: battly_minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - battly

  # ── Create MinIO default bucket ────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: battly_minio_init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-battly}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-secret123}
      AWS_BUCKET: ${AWS_BUCKET:-battly}
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-battly} $${MINIO_ROOT_PASSWORD:-secret123};
        mc mb local/$${AWS_BUCKET:-battly} --ignore-existing;
        mc anonymous set download local/$${AWS_BUCKET:-battly}/public;
        exit 0;
      "
    networks:
      - battly

  # ── Meilisearch ────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: battly_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:?Set MEILISEARCH_KEY in .env}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    networks:
      - battly

  # ── Laravel Reverb (WebSocket Server) ──────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: battly_reverb
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - CONTAINER_ROLE=reverb
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    networks:
      - battly

  # ── Queue Worker (Supervisor) ──────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: battly_worker
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - CONTAINER_ROLE=worker
    command: ["supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]
    networks:
      - battly

# ── Volumes ────────────────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  meili_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────
networks:
  battly:
    driver: bridge
