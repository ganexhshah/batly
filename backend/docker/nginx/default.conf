##############################################################################
#  Nginx — Battly Backend
##############################################################################

# Upstream: PHP-FPM (with persistent connection pooling)
upstream php-fpm {
    server app:9000;
    keepalive 32;
}

# Upstream: Laravel Reverb WebSocket
upstream reverb-ws {
    server reverb:8080;
    keepalive 8;
}

limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=connections_per_ip:10m;

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    server_tokens off;
    client_max_body_size 10M;
    limit_conn connections_per_ip 40;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # ── Main location ────────────────────────────────────────────────
    location / {
        limit_req zone=api_per_ip burst=40 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP processing ───────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
    }

    # ── WebSocket (Laravel Reverb) ───────────────────────────────────
    location /app {
        proxy_pass http://reverb-ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Deny hidden files ────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Static file caching ──────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
